<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trippy — agentic flights</title>
    <meta name="description" content="Search, book, and check in for flights through chat. An MCP-native travel agent for humans and other agents." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("trippy-theme");
          var prefers = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = stored ? stored === "dark" : prefers;
          if (dark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
    <script type="module" src="./frontend.tsx" async></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
